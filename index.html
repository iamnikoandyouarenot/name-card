<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#191b21">
    <meta name="apple-mobile-web-app-title" content="名片">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png">
    <link rel="manifest" href="manifest.webmanifest">
    <title>名片管理中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=Noto+Serif+TC:wght@600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        :root {
            /* 墨案印鑑設計系統 */
            --ink: #191b21;          /* 桌面墨色 */
            --ink-2: #20242c;        /* 浮起表面 */
            --ink-3: #2a2f39;        /* 再浮起 */
            --paper: #f6f2e8;        /* 名片紙白 */
            --paper-2: #efe9db;
            --paper-edge: #ddd5c2;   /* 紙緣 */
            --ink-txt: #29251a;      /* 紙上墨字 */
            --ink-txt-2: #756f5f;    /* 紙上次要字 */
            --seal: #c8402a;         /* 印泥紅 */
            --seal-deep: #a93321;
            --jade: #2f9f79;         /* 青瓷綠（主行動）*/
            --jade-deep: #237a5c;
            --text: #ece7da;         /* 墨上紙白字 */
            --text-2: #b5afa0;
            --text-3: #857f70;
            --line: rgba(236,231,218,0.1);

            /* 相容舊變數名 */
            --primary: var(--jade);
            --primary-dark: var(--jade-deep);
            --accent: var(--seal);
            --bg-dark: var(--ink);
            --bg-card: var(--ink-2);
            --text-primary: var(--text);
            --text-secondary: var(--text-2);
            --text-muted: var(--text-3);
            --border: var(--line);
            --danger: #d05252;
            --success: var(--jade);
            --warning: #d9930d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background:
                radial-gradient(1200px 500px at 85% -10%, rgba(47,159,121,0.06), transparent 60%),
                var(--ink);
            min-height: 100vh;
            color: var(--text);
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
            line-height: 1.45;
        }

        /* 極淡紙纖噪點，讓墨面有材質 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: repeating-linear-gradient(
                0deg,
                rgba(255,255,255,0.012) 0px, rgba(255,255,255,0.012) 1px,
                transparent 1px, transparent 3px);
            pointer-events: none;
            z-index: 0;
        }

        :focus-visible {
            outline: 2px solid var(--jade);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* ── Header ─────────────────────── */
        .header {
            background: rgba(25,27,33,0.92);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid var(--line);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
        }

        .logo { display: flex; align-items: center; gap: 11px; }

        /* 朱紅印章 logo */
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(160deg, var(--seal), var(--seal-deep));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 21px;
            font-family: 'Noto Serif TC', serif;
            font-weight: 700;
            color: #fdf9ef;
            transform: rotate(-3deg);
            box-shadow: inset 0 0 0 1.5px rgba(253,249,239,0.28), 0 3px 10px rgba(0,0,0,0.35);
            flex-shrink: 0;
        }

        .logo-text h1 {
            font-family: 'Noto Serif TC', serif;
            font-size: 19px;
            font-weight: 700;
            letter-spacing: 0.04em;
        }
        .logo-text p { font-size: 10.5px; color: var(--text-3); margin-top: 2px; letter-spacing: 0.06em; }

        .header-actions { display: flex; gap: 8px; align-items: center; }

        /* ── 按鈕 ─────────────────────── */
        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.18s, transform 0.12s, border-color 0.18s;
            display: flex;
            align-items: center;
            gap: 5px;
            border: none;
            font-family: inherit;
        }
        .btn:active { transform: scale(0.97); }

        .btn-primary {
            background: linear-gradient(150deg, var(--jade), var(--jade-deep));
            color: #f4fbf7;
            font-weight: 600;
        }
        .btn-primary:hover { filter: brightness(1.08); }

        .btn-secondary {
            background: var(--ink-3);
            color: var(--text);
            border: 1px solid var(--line);
        }
        .btn-secondary:hover { border-color: rgba(236,231,218,0.25); }

        .btn-danger {
            background: rgba(208,82,82,0.1);
            color: #e08a8a;
            border: 1px solid rgba(208,82,82,0.32);
        }

        .btn-icon { padding: 8px; min-width: 36px; justify-content: center; }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── 搜尋與分類 ─────────────────── */
        .search-section { display: flex; gap: 10px; flex-wrap: wrap; }

        .search-box { flex: 1; min-width: 180px; position: relative; }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            background: var(--ink-2);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            transition: border-color 0.18s;
        }
        .search-box input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(47,159,121,0.12); }
        .search-box input::placeholder { color: var(--text-3); }
        .search-box::before {
            content: '⌕';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-52%);
            font-size: 17px;
            color: var(--text-3);
        }

        .categories { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

        .category-btn {
            padding: 6px 13px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.18s;
            background: transparent;
            color: var(--text-2);
            border: 1px solid var(--line);
            font-family: inherit;
        }
        .category-btn:hover { border-color: rgba(236,231,218,0.3); color: var(--text); }
        .category-btn.active {
            background: var(--jade);
            color: #f4fbf7;
            border-color: var(--jade);
            font-weight: 600;
        }

        .category-manage-btn {
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 12px;
            cursor: pointer;
            background: transparent;
            color: var(--text-3);
            border: 1px dashed var(--line);
            font-family: inherit;
        }

        /* ── 主區 ─────────────────────── */
        .main { padding: 16px; position: relative; z-index: 1; max-width: 1180px; margin: 0 auto; }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 18px;
        }

        .stat-card {
            background: var(--ink-2);
            border-radius: 10px;
            padding: 12px 10px 10px;
            border: 1px solid var(--line);
            text-align: center;
        }

        .stat-label { font-size: 10.5px; color: var(--text-3); margin-bottom: 4px; letter-spacing: 0.08em; }
        .stat-value {
            font-family: 'Noto Serif TC', serif;
            font-size: 26px;
            font-weight: 700;
            line-height: 1.1;
            font-variant-numeric: tabular-nums;
        }
        .stat-value.primary { color: var(--jade); }
        .stat-value.accent { color: var(--seal); }

        /* ── 名片（紙白卡躺在墨桌上）──────── */
        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .card {
            background: linear-gradient(178deg, var(--paper) 88%, var(--paper-2));
            border-radius: 10px;
            padding: 16px;
            border: 1px solid var(--paper-edge);
            cursor: pointer;
            transition: transform 0.22s, box-shadow 0.22s;
            position: relative;
            color: var(--ink-txt);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2), 0 6px 16px rgba(0,0,0,0.3);
        }

        .card:hover {
            transform: translateY(-3px) rotate(-0.2deg);
            box-shadow: 0 2px 0 rgba(0,0,0,0.18), 0 16px 30px rgba(0,0,0,0.42);
        }

        /* 分類：小印風格章 */
        .card-category {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            background: transparent;
            color: var(--seal);
            border: 1.5px solid rgba(200,64,42,0.55);
        }

        .card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }

        /* 朱紅姓氏印章 */
        .card-avatar {
            width: 46px;
            height: 46px;
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            font-weight: 700;
            font-family: 'Noto Serif TC', serif;
            background: linear-gradient(160deg, var(--seal), var(--seal-deep));
            color: #fdf9ef;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            transform: rotate(-2.5deg);
            box-shadow: inset 0 0 0 1.5px rgba(253,249,239,0.26), 0 2px 6px rgba(0,0,0,0.22);
        }

        .card-name {
            font-family: 'Noto Serif TC', serif;
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 1px;
            color: var(--ink-txt);
            letter-spacing: 0.02em;
        }
        .card-name-en { font-size: 12px; color: var(--ink-txt-2); }
        .card-title { font-size: 12px; color: var(--ink-txt-2); }
        .card-company { font-size: 13px; color: #4c4638; margin-bottom: 10px; font-weight: 500; }

        .card-contacts { display: flex; flex-direction: column; gap: 6px; }
        .card-contact {
            font-size: 12.5px;
            color: #4c4638;
            display: flex;
            align-items: center;
            gap: 6px;
            font-variant-numeric: tabular-nums;
        }

        .card-line {
            background: rgba(47,159,121,0.1);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(47,159,121,0.3);
            color: var(--jade-deep);
            font-weight: 600;
        }

        .card-images { display: flex; gap: 6px; margin-top: 10px; }
        .card-image-thumb {
            flex: 1;
            height: 50px;
            border-radius: 5px;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--paper-edge);
        }

        /* ── Modal ─────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(12,13,17,0.82);
            backdrop-filter: blur(8px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            overflow-y: auto;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--ink-2);
            border-radius: 14px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--line);
            margin-bottom: 20px;
            box-shadow: 0 24px 60px rgba(0,0,0,0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--line);
        }
        .modal-header h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 0.03em;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--ink-3);
            border: 1px solid var(--line);
            color: var(--text-2);
            font-size: 15px;
            cursor: pointer;
        }

        /* ── 表單 ─────────────────────── */
        .form-group { margin-bottom: 13px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-label {
            display: block;
            font-size: 11.5px;
            color: var(--text-2);
            margin-bottom: 5px;
            letter-spacing: 0.05em;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: var(--ink);
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.18s, background-color 0.4s;
        }
        .form-input:focus { border-color: var(--jade); box-shadow: 0 0 0 3px rgba(47,159,121,0.12); }
        .form-input::placeholder { color: var(--text-3); }
        .form-input.highlight { background: rgba(47,159,121,0.08); border-color: rgba(47,159,121,0.35); }
        textarea.form-input { resize: vertical; min-height: 60px; }

        .form-input-row { display: flex; gap: 8px; }
        .form-input-row .form-input { flex: 1; }
        .form-input-row .btn { padding: 10px 12px; flex-shrink: 0; }

        .form-actions { display: flex; gap: 10px; margin-top: 16px; }
        .form-actions .btn { flex: 1; justify-content: center; padding: 12px; font-size: 14px; }

        /* ── 圖片上傳區 ─────────────────── */
        .image-section {
            margin-bottom: 14px;
            padding: 12px;
            background: var(--ink);
            border-radius: 10px;
            border: 1px dashed var(--line);
        }
        .image-section-title {
            font-size: 12.5px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-2);
            letter-spacing: 0.06em;
        }

        .image-row { display: flex; gap: 10px; margin-bottom: 10px; }

        .image-box {
            flex: 1;
            aspect-ratio: 16/10;
            border-radius: 8px;
            background: var(--ink-2);
            border: 1.5px dashed var(--line);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }
        .image-box.has-image { border-style: solid; border-color: var(--jade); }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        .image-box-label { font-size: 11px; color: var(--text-3); text-align: center; }
        .image-box-icon { font-size: 22px; margin-bottom: 4px; opacity: 0.7; }

        .image-btns { display: flex; gap: 8px; }

        .image-btn {
            flex: 1;
            padding: 9px 8px;
            border-radius: 8px;
            border: 1px solid var(--line);
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            background: var(--ink-3);
            color: var(--text);
            transition: border-color 0.18s, filter 0.18s;
        }
        .image-btn:hover { border-color: rgba(236,231,218,0.28); }
        .image-btn.camera { background: var(--ink-3); }
        .image-btn.gallery { background: var(--ink-2); color: var(--text-2); }
        .image-btn.recognize {
            background: linear-gradient(150deg, var(--jade), var(--jade-deep));
            color: #f4fbf7;
            border-color: transparent;
            font-weight: 600;
        }
        .image-btn:disabled { opacity: 0.45; cursor: not-allowed; }

        /* ── 大頭照 ─────────────────────── */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 12px;
            background: var(--ink);
            border-radius: 10px;
            border: 1px dashed var(--line);
        }

        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 10px;
            background: var(--ink-2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background-size: cover;
            background-position: center;
            border: 1.5px dashed var(--line);
            flex-shrink: 0;
        }
        .avatar-preview.has-image { border-style: solid; border-color: var(--jade); }
        .avatar-info { flex: 1; }
        .avatar-info h4 { font-size: 13px; margin-bottom: 3px; color: var(--text); }
        .avatar-info p { font-size: 11px; color: var(--text-3); margin-bottom: 6px; }

        .avatar-btns { display: flex; gap: 6px; }
        .avatar-btn {
            padding: 6px 10px;
            background: var(--ink-3);
            border: 1px solid var(--line);
            border-radius: 6px;
            color: var(--text);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }

        /* ── AI 辨識結果 ─────────────────── */
        .ocr-result {
            margin-top: 10px;
            padding: 12px;
            background: rgba(47,159,121,0.07);
            border-radius: 8px;
            border: 1px solid rgba(47,159,121,0.22);
            display: none;
        }
        .ocr-result.active { display: block; }
        .ocr-result h4 {
            color: var(--jade);
            margin-bottom: 8px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ocr-lines { max-height: 280px; overflow-y: auto; }
        .ocr-line {
            display: flex; align-items: center; gap: 8px;
            padding: 8px 10px; margin-bottom: 6px;
            background: rgba(0,0,0,0.25); border-radius: 8px;
            font-size: 13px; border-left: 3px solid transparent;
        }
        .ocr-line.assigned { border-left-color: var(--jade); background: rgba(47,159,121,0.08); }
        .ocr-line.ignored { opacity: 0.4; }
        .ocr-line-text { flex: 1; word-break: break-all; line-height: 1.3; }
        .ocr-line-select {
            flex-shrink: 0; padding: 6px 8px; border-radius: 6px;
            font-size: 12px; font-family: inherit;
            background: var(--ink-3); color: var(--text);
            border: 1px solid var(--line); cursor: pointer; outline: none; min-width: 80px;
        }
        .ocr-line-select:focus { border-color: var(--jade); }
        .ocr-line.assigned .ocr-line-select {
            background: rgba(47,159,121,0.18); border-color: var(--jade);
            color: var(--jade); font-weight: 600;
        }

        .ocr-apply-bar { display: flex; gap: 8px; margin-top: 10px; }
        .ocr-apply-bar button {
            flex: 1; padding: 10px; border-radius: 8px;
            font-size: 13px; font-weight: 600; border: none;
            cursor: pointer; font-family: inherit;
        }
        .ocr-apply-btn { background: linear-gradient(150deg, var(--jade), var(--jade-deep)); color: #f4fbf7; }
        .ocr-rescan-btn { background: var(--ink-3); color: var(--text-2); border: 1px solid var(--line) !important; }

        .ai-summary { font-size: 12px; color: var(--text-2); line-height: 1.6; max-height: 200px; overflow-y: auto; }
        .ai-summary-row { display: flex; gap: 8px; padding: 4px 0; border-bottom: 1px solid var(--line); }
        .ai-summary-row:last-child { border-bottom: none; }
        .ai-summary-label { color: var(--jade); min-width: 60px; font-weight: 600; }
        .ai-summary-value { flex: 1; color: var(--text); word-break: break-all; font-variant-numeric: tabular-nums; }

        /* ── 詳細頁 ─────────────────────── */
        .detail-header { display: flex; gap: 13px; margin-bottom: 14px; align-items: center; }

        .detail-avatar {
            width: 64px;
            height: 64px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            font-weight: 700;
            font-family: 'Noto Serif TC', serif;
            background: linear-gradient(160deg, var(--seal), var(--seal-deep));
            color: #fdf9ef;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
            transform: rotate(-2.5deg);
            box-shadow: inset 0 0 0 2px rgba(253,249,239,0.26), 0 3px 10px rgba(0,0,0,0.3);
        }

        .detail-info h2 {
            font-family: 'Noto Serif TC', serif;
            font-size: 23px;
            margin-bottom: 2px;
            letter-spacing: 0.03em;
        }
        .detail-info .name-en { font-size: 13px; color: var(--text-3); margin-bottom: 4px; }
        .detail-info p { color: var(--text-2); font-size: 13px; }

        .detail-category {
            display: inline-block;
            padding: 3px 9px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            margin-top: 6px;
            background: transparent;
            color: var(--seal);
            border: 1.5px solid rgba(200,64,42,0.55);
        }

        .detail-images { display: flex; gap: 8px; margin-bottom: 14px; }
        .detail-image {
            flex: 1;
            border-radius: 8px;
            border: 1px solid var(--line);
            overflow: hidden;
            background: var(--ink);
        }
        .detail-image img { width: 100%; display: block; }
        .detail-image-label {
            font-size: 10px; color: var(--text-3);
            text-align: center; padding: 4px;
            background: rgba(0,0,0,0.3);
            letter-spacing: 0.1em;
        }

        .detail-section {
            background: var(--ink);
            border-radius: 10px;
            padding: 4px 14px;
            margin-bottom: 12px;
            border: 1px solid var(--line);
        }

        .detail-row {
            display: flex;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
        }
        .detail-row:last-child { border-bottom: none; }
        .detail-row-icon { display: none; }
        .detail-row-label {
            width: 52px;
            font-size: 11px;
            color: var(--text-3);
            letter-spacing: 0.1em;
            flex-shrink: 0;
        }
        .detail-row-value {
            flex: 1;
            font-size: 13.5px;
            word-break: break-all;
            font-variant-numeric: tabular-nums;
        }
        .detail-row-value a { color: var(--text); text-decoration: none; border-bottom: 1px dotted rgba(236,231,218,0.3); }
        .detail-row-value a:hover { color: var(--jade); border-bottom-color: var(--jade); }
        .detail-row-value.line { color: var(--jade); font-weight: 600; }

        .detail-notes {
            background: var(--ink);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 12px;
            border: 1px solid var(--line);
        }
        .detail-notes h4 { font-size: 11px; color: var(--text-3); margin-bottom: 6px; letter-spacing: 0.1em; }
        .detail-notes p { font-size: 13px; line-height: 1.6; color: var(--text-2); }

        /* ── 空狀態 ─────────────────────── */
        .empty-state { text-align: center; padding: 56px 20px; color: var(--text-3); }
        .empty-state-icon { font-size: 42px; margin-bottom: 12px; opacity: 0.45; }
        .empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--text-2); font-family: 'Noto Serif TC', serif; }

        /* ── 通知 ─────────────────────── */
        .notification {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--paper);
            color: var(--ink-txt);
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 10px 36px rgba(0,0,0,0.45);
            z-index: 300;
            transition: transform 0.3s;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
            border-left: 4px solid var(--text-3);
        }
        .notification.active { transform: translateX(-50%) translateY(0); }
        .notification.error { border-left-color: var(--danger); }
        .notification.success { border-left-color: var(--jade); }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .sync-status { font-size: 10px; color: var(--text-3); display: flex; align-items: center; gap: 4px; }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-3); }
        .sync-dot.online { background: var(--jade); }
        .sync-dot.syncing { background: var(--seal); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .hidden-input { display: none; }

        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(19,20,25,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 400;
        }
        .loading-overlay.active { display: flex; }
        .loading-overlay .loading { width: 40px; height: 40px; border-width: 3px; border-top-color: var(--jade); }
        .loading-overlay p { color: var(--text-2); font-size: 14px; }

        /* ── 分類管理 ─────────────────── */
        .category-list {
            max-height: min(56vh, 540px);
            min-height: 160px;
            overflow-y: auto;
            padding-right: 4px;
        }

        /* 桌機：分類管理視窗加寬、可移動、邊緣可拉伸 */
        .modal-resize-r, .modal-resize-b, .modal-resize-br { display: none; }

        @media (min-width: 768px) {
            #categoryModal .modal {
                max-width: 560px;
                position: relative;
                display: flex;
                flex-direction: column;
            }
            #categoryModal .modal-header { cursor: move; flex-shrink: 0; }
            #categoryModal .add-category-row { flex-shrink: 0; }
            #categoryModal .category-list { flex: 1; }

            .modal-resize-r, .modal-resize-b, .modal-resize-br {
                display: block;
                position: absolute;
                z-index: 5;
            }
            .modal-resize-r  { top: 0; right: -3px; width: 8px; height: 100%; cursor: ew-resize; }
            .modal-resize-b  { left: 0; bottom: -3px; width: 100%; height: 8px; cursor: ns-resize; }
            .modal-resize-br { right: -4px; bottom: -4px; width: 18px; height: 18px; cursor: nwse-resize; }
        }
        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            background: var(--ink);
            border: 1px solid var(--line);
            border-radius: 8px;
            margin-bottom: 8px;
            user-select: none;
        }
        .category-item.dragging {
            border-color: var(--jade);
            box-shadow: 0 8px 20px rgba(0,0,0,0.45);
            opacity: 0.92;
        }
        .category-item-handle {
            cursor: grab;
            color: var(--text-3);
            font-size: 15px;
            padding: 4px 6px;
            touch-action: none;
            flex-shrink: 0;
        }
        .category-item-handle:active { cursor: grabbing; color: var(--jade); }
        .category-item-name { font-size: 14px; flex: 1; }
        .category-item-delete {
            padding: 4px 9px;
            background: rgba(208,82,82,0.1);
            border: 1px solid rgba(208,82,82,0.3);
            border-radius: 5px;
            color: #e08a8a;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
        }
        .add-category-row { display: flex; gap: 8px; margin-top: 12px; }
        .add-category-row input { flex: 1; }

        /* ── 分享 ─────────────────────── */
        .share-hint { font-size: 13px; color: var(--text-2); line-height: 1.6; margin-bottom: 16px; text-align: center; }
        .share-qr {
            display: flex; justify-content: center;
            padding: 16px; background: var(--paper);
            border-radius: 10px; margin-bottom: 16px;
            border: 1px solid var(--paper-edge);
        }
        .share-qr img, .share-qr canvas { display: block; }
        .share-url-box {
            background: var(--ink);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 4px;
        }
        .share-url { font-size: 12px; color: var(--jade); word-break: break-all; line-height: 1.4; }

        /* ── 圖片編輯器 ─────────────────── */
        .image-editor-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10,11,14,0.97);
            display: none;
            flex-direction: column;
            z-index: 500;
            padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom) 0;
        }
        .image-editor-overlay.active { display: flex; }

        .image-editor-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: var(--ink-2);
            border-bottom: 1px solid var(--line);
        }
        .image-editor-header h3 {
            font-family: 'Noto Serif TC', serif;
            font-size: 16px;
            font-weight: 700;
        }
        .image-editor-close {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: var(--ink-3);
            border: 1px solid var(--line);
            color: var(--text-2);
            font-size: 17px;
            cursor: pointer;
        }

        .image-editor-hint {
            padding: 8px 16px;
            background: rgba(47,159,121,0.09);
            color: var(--jade);
            font-size: 12px;
            text-align: center;
            border-bottom: 1px solid var(--line);
        }

        .image-editor-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #000;
            min-height: 0;
        }
        .image-editor-container img { max-width: 100%; max-height: 100%; display: block; }

        .image-editor-tools {
            display: flex;
            gap: 8px;
            padding: 10px 12px;
            background: var(--ink-2);
            border-top: 1px solid var(--line);
            justify-content: center;
            flex-wrap: wrap;
        }

        .editor-tool-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            width: 52px;
            padding: 8px 4px;
            border-radius: 10px;
            background: var(--ink-3);
            color: var(--text);
            border: 1px solid var(--line);
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, transform 0.12s;
        }
        .editor-tool-btn:active { background: var(--jade); transform: scale(0.95); }
        .editor-tool-btn span { font-size: 18px; line-height: 1; }
        .editor-tool-btn small { font-size: 10px; color: var(--text-2); }

        .editor-tool-btn.restore-btn {
            background: transparent;
            border: 1.5px solid rgba(200,64,42,0.6);
        }
        .editor-tool-btn.restore-btn small { color: var(--seal); font-weight: 600; }

        .image-editor-actions {
            display: flex;
            gap: 12px;
            padding: 12px 16px;
            padding-bottom: calc(12px + env(safe-area-inset-bottom));
            background: var(--ink-2);
            border-top: 1px solid var(--line);
        }

        .editor-btn {
            flex: 1;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            transition: filter 0.15s, transform 0.12s;
        }
        .editor-btn:active { transform: scale(0.98); }
        .editor-btn.cancel {
            background: var(--ink-3);
            color: var(--text-2);
            border: 1px solid var(--line);
        }
        .editor-btn.confirm {
            background: linear-gradient(150deg, var(--jade), var(--jade-deep));
            color: #f4fbf7;
        }

        /* Cropper.js 覆蓋 */
        .cropper-view-box, .cropper-face { border-radius: 0; }
        .cropper-view-box { outline: 2px solid var(--jade); outline-offset: -2px; }
        .cropper-line { background-color: var(--jade); }
        .cropper-point { background-color: var(--jade); width: 10px; height: 10px; }
        .cropper-modal { background-color: rgba(0,0,0,0.7); }

        /* ── RWD 與可近性 ─────────────── */
        @media (max-width: 480px) {
            .header-top { flex-wrap: wrap; }
            .form-row { grid-template-columns: 1fr; }
            .cards-grid { grid-template-columns: 1fr; }
            .avatar-section { flex-direction: column; text-align: center; }
            .avatar-btns { justify-content: center; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                transition-duration: 0.01ms !important;
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
            }
        }
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>
    <div id="loadingOverlay" class="loading-overlay">
        <span class="loading"></span>
        <p id="loadingText">載入中...</p>
    </div>

    <!-- 圖片編輯器 -->
    <div class="image-editor-overlay" id="imageEditorOverlay">
        <div class="image-editor-header">
            <h3 id="editorTitle">📐 調整名片範圍</h3>
            <button class="image-editor-close" onclick="cancelImageEdit()">✕</button>
        </div>
        <div class="image-editor-hint" id="editorHint">💡 拖曳四角調整裁切範圍，可旋轉拉正</div>
        <div class="image-editor-container">
            <img id="editorImage" src="" alt="編輯中">
        </div>
        <div class="image-editor-tools">
            <button class="editor-tool-btn restore-btn" id="restoreBtn" onclick="restoreOriginal()" title="還原原圖"><span>↩️</span><small>還原原圖</small></button>
            <button class="editor-tool-btn" onclick="rotateImage(-90)" title="左轉"><span>↺</span><small>左轉</small></button>
            <button class="editor-tool-btn" onclick="rotateImage(90)" title="右轉"><span>↻</span><small>右轉</small></button>
            <button class="editor-tool-btn" onclick="zoomImage(0.1)" title="放大"><span>➕</span><small>放大</small></button>
            <button class="editor-tool-btn" onclick="zoomImage(-0.1)" title="縮小"><span>➖</span><small>縮小</small></button>
            <button class="editor-tool-btn" onclick="selectAll()" title="全選"><span>⛶</span><small>全選</small></button>
            <button class="editor-tool-btn" onclick="resetCrop()" title="重設"><span>↻</span><small>重設</small></button>
        </div>
        <div class="image-editor-actions">
            <button class="editor-btn cancel" onclick="cancelImageEdit()">取消</button>
            <button class="editor-btn confirm" onclick="confirmImageEdit()">✓ 完成</button>
        </div>
    </div>

    <input type="file" id="cardFrontCameraInput" class="hidden-input" accept="image/*" capture="environment">
    <input type="file" id="cardFrontGalleryInput" class="hidden-input" accept="image/*">
    <input type="file" id="cardBackCameraInput" class="hidden-input" accept="image/*" capture="environment">
    <input type="file" id="cardBackGalleryInput" class="hidden-input" accept="image/*">
    <input type="file" id="avatarCameraInput" class="hidden-input" accept="image/*" capture="user">
    <input type="file" id="avatarGalleryInput" class="hidden-input" accept="image/*">

    <header class="header">
        <div class="header-top">
            <div class="logo">
                <div class="logo-icon">名</div>
                <div class="logo-text">
                    <h1>名片管理中心</h1>
                    <p>AI 智慧辨識 · v9</p>
                </div>
            </div>
            <div class="header-actions">
                <div class="sync-status">
                    <span class="sync-dot" id="syncDot"></span>
                    <span id="syncText">離線</span>
                </div>
                <button class="btn btn-secondary btn-icon" onclick="openShareModal()" title="分享給同事">📤</button>
                <button class="btn btn-secondary btn-icon" onclick="syncFromCloud()" title="同步資料">🔄</button>
                <button class="btn btn-primary" onclick="openAddModal()">➕ 新增</button>
            </div>
        </div>
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="搜尋姓名、公司、LINE..." oninput="filterCards()">
            </div>
            <div class="categories" id="categories"></div>
        </div>
    </header>

    <main class="main">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-label">📊 總名片</div>
                <div class="stat-value" id="totalCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">💬 有LINE</div>
                <div class="stat-value primary" id="lineCount">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">🔍 結果</div>
                <div class="stat-value accent" id="filterCount">0</div>
            </div>
        </div>
        <div class="cards-grid" id="cardsGrid"></div>
    </main>

    <!-- 新增/編輯 Modal -->
    <div class="modal-overlay" id="addModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">新增名片</h2>
                <button class="modal-close" onclick="closeAddModal()">✕</button>
            </div>

            <div class="image-section">
                <div class="image-section-title">名片照片</div>
                <div class="image-row">
                    <div class="image-box" id="cardFrontBox" onclick="editCardImage('front')">
                        <span class="image-box-icon">📄</span>
                        <span class="image-box-label">正面</span>
                    </div>
                    <div class="image-box" id="cardBackBox" onclick="editCardImage('back')">
                        <span class="image-box-icon">📄</span>
                        <span class="image-box-label">背面</span>
                    </div>
                </div>
                <div class="image-btns">
                    <button type="button" class="image-btn camera" onclick="captureCard('front')">📷 拍正面</button>
                    <button type="button" class="image-btn gallery" onclick="selectCard('front')">🖼️ 選正面</button>
                    <button type="button" class="image-btn recognize" id="recognizeBtn" onclick="recognizeCard()" disabled>🤖 AI 辨識</button>
                </div>
                <div class="image-btns" style="margin-top:6px;">
                    <button type="button" class="image-btn camera" onclick="captureCard('back')">📷 拍背面</button>
                    <button type="button" class="image-btn gallery" onclick="selectCard('back')">🖼️ 選背面</button>
                </div>
                
                <!-- AI 辨識結果摘要 -->
                <div class="ocr-result" id="ocrResult">
                    <h4 id="ocrResultTitle">🤖 AI 已辨識並填入表單</h4>
                    <div class="ai-summary" id="aiSummary"></div>
                    <div class="ocr-apply-bar">
                        <button type="button" class="ocr-rescan-btn" onclick="recognizeCard()">🔄 重新辨識</button>
                    </div>
                </div>
            </div>

            <div class="avatar-section">
                <div class="avatar-preview" id="avatarPreview">👤</div>
                <div class="avatar-info">
                    <h4>大頭照</h4>
                    <p>上傳聯絡人照片</p>
                    <div class="avatar-btns">
                        <button type="button" class="avatar-btn" onclick="captureAvatar()">📷 拍照</button>
                        <button type="button" class="avatar-btn" onclick="selectAvatar()">🖼️ 選擇</button>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">姓名（中文）*</label>
                    <input type="text" class="form-input" id="cardName" placeholder="王大明">
                </div>
                <div class="form-group">
                    <label class="form-label">英文名</label>
                    <input type="text" class="form-input" id="cardNameEn" placeholder="David Wang">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">公司</label>
                    <input type="text" class="form-input" id="cardCompany" placeholder="台灣科技公司">
                </div>
                <div class="form-group">
                    <label class="form-label">分類</label>
                    <div class="form-input-row">
                        <select class="form-input" id="cardCategory"></select>
                        <button type="button" class="btn btn-secondary" onclick="openCategoryModal()">⚙️</button>
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">職稱</label>
                <input type="text" class="form-input" id="cardTitle" placeholder="業務經理">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">行動電話 1</label>
                    <input type="tel" class="form-input" id="cardMobile" placeholder="0912-345-678">
                </div>
                <div class="form-group">
                    <label class="form-label">行動電話 2</label>
                    <input type="tel" class="form-input" id="cardMobile2" placeholder="第二支手機">
                </div>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">市話</label>
                    <input type="tel" class="form-input" id="cardPhone" placeholder="(02)1234-5678">
                </div>
                <div class="form-group">
                    <label class="form-label">傳真</label>
                    <input type="tel" class="form-input" id="cardFax" placeholder="(02)1234-5678">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">統編</label>
                <input type="text" class="form-input" id="cardTaxId" placeholder="12345678">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">LINE ID</label>
                    <input type="text" class="form-input highlight" id="cardLine" placeholder="line_id">
                </div>
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" class="form-input" id="cardEmail" placeholder="email@example.com">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">地址</label>
                <input type="text" class="form-input" id="cardAddress" placeholder="台北市...">
            </div>
            <div class="form-group">
                <label class="form-label">網站</label>
                <input type="text" class="form-input" id="cardWebsite" placeholder="www.example.com">
            </div>
            <div class="form-group">
                <label class="form-label">備註</label>
                <textarea class="form-input" id="cardNotes" placeholder="備註..."></textarea>
            </div>
            <div class="form-actions">
                <button type="button" class="btn btn-secondary" onclick="closeAddModal()">取消</button>
                <button type="button" class="btn btn-primary" id="saveBtn" onclick="saveCard()">💾 儲存</button>
            </div>
        </div>
    </div>

    <!-- 詳細 Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <div class="modal-header">
                <h2>名片詳情</h2>
                <button class="modal-close" onclick="closeDetailModal()">✕</button>
            </div>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- 分類管理 Modal -->
    <div class="modal-overlay" id="categoryModal">
        <div class="modal" id="categoryModalBox">
            <div class="modal-header">
                <h2>管理分類</h2>
                <button class="modal-close" onclick="closeCategoryModal()">✕</button>
            </div>
            <div class="category-list" id="categoryList"></div>
            <div class="add-category-row">
                <input type="text" class="form-input" id="newCategoryInput" placeholder="輸入新分類名稱...">
                <button class="btn btn-primary" onclick="addNewCategory()">➕ 新增</button>
            </div>
            <div class="modal-resize-r" data-dir="r"></div>
            <div class="modal-resize-b" data-dir="b"></div>
            <div class="modal-resize-br" data-dir="br"></div>
        </div>

        function openCategoryModal() {

        // ── 桌機：拖曳標題列移動視窗、拖曳邊緣調整大小 ──
        (function initCategoryModalDrag() {
            var header = document.querySelector('#categoryModal .modal-header');
            var modal = document.querySelector('#categoryModal .modal');
            if (!header || !modal) return;
            var drag = null;    // 移動狀態
            var resize = null;  // 拉伸狀態

            // 移動
            header.addEventListener('pointerdown', function(e) {
                if (window.innerWidth < 768) return;
                if (e.target.closest('.modal-close')) return;
                e.preventDefault();
                drag = {
                    sx: e.clientX, sy: e.clientY,
                    ox: parseFloat(modal.dataset.tx || 0),
                    oy: parseFloat(modal.dataset.ty || 0)
                };
                document.addEventListener('pointermove', onMove);
                document.addEventListener('pointerup', onUp);
            });

            // 拉伸（三個把手共用）
            modal.querySelectorAll('.modal-resize-r, .modal-resize-b, .modal-resize-br').forEach(function(h) {
                h.addEventListener('pointerdown', function(e) {
                    if (window.innerWidth < 768) return;
                    e.preventDefault();
                    e.stopPropagation();
                    var rect = modal.getBoundingClientRect();

                    // 先「錨定」：固定目前位置與尺寸，脫離置中排版
                    // → 按下瞬間尺寸不變；拉右邊只有右邊動、左邊固定
                    modal.style.position = 'fixed';
                    modal.style.left = rect.left + 'px';
                    modal.style.top = rect.top + 'px';
                    modal.style.margin = '0';
                    modal.style.transform = 'none';
                    modal.dataset.tx = 0; modal.dataset.ty = 0;
                    modal.style.width = rect.width + 'px';
                    modal.style.height = rect.height + 'px';
                    // 尺寸鎖定後才解除上限
                    modal.style.maxWidth = 'none';
                    document.getElementById('categoryList').style.maxHeight = 'none';

                    resize = {
                        dir: h.dataset.dir,
                        sx: e.clientX, sy: e.clientY,
                        w: rect.width, h: rect.height,
                        left: rect.left, top: rect.top
                    };
                    document.addEventListener('pointermove', onMove);
                    document.addEventListener('pointerup', onUp);
                });
            });

            function onMove(e) {
                if (resize) {
                    var minW = 380, minH = 300;
                    var maxW = window.innerWidth - resize.left - 10;
                    var maxH = window.innerHeight - resize.top - 10;
                    if (resize.dir === 'r' || resize.dir === 'br') {
                        var w = resize.w + (e.clientX - resize.sx);
                        modal.style.width = Math.min(maxW, Math.max(minW, w)) + 'px';
                    }
                    if (resize.dir === 'b' || resize.dir === 'br') {
                        var hh = resize.h + (e.clientY - resize.sy);
                        modal.style.height = Math.min(maxH, Math.max(minH, hh)) + 'px';
                    }
                    return;
                }
                if (drag) {
                    var tx = drag.ox + (e.clientX - drag.sx);
                    var ty = drag.oy + (e.clientY - drag.sy);
                    modal.dataset.tx = tx; modal.dataset.ty = ty;
                    modal.style.transform = 'translate(' + tx + 'px,' + ty + 'px)';
                }
            }

            function onUp() {
                var wasActive = !!(drag || resize);
                drag = null;
                resize = null;
                document.removeEventListener('pointermove', onMove);
                document.removeEventListener('pointerup', onUp);
                if (wasActive) {
                    // 吞掉拖放結束合成的 click，避免觸發「點背景關閉」
                    document.addEventListener('click', swallowClick, true);
                    setTimeout(function() {
                        document.removeEventListener('click', swallowClick, true);
                    }, 0);
                }
            }

            function swallowClick(e) {
                e.stopPropagation();
                document.removeEventListener('click', swallowClick, true);
            }
        })();

        function renderCategoryList() {

        // ── 拖曳排序（Pointer Events，桌機手機通用）──
        var dragState = null;

        function bindCategoryDrag(list) {
            var handles = list.querySelectorAll('.category-item-handle');
            handles.forEach(function(h) {
                h.addEventListener('pointerdown', onCatDragStart);
            });
        }

        function onCatDragStart(e) {
            e.preventDefault();
            var item = e.target.closest('.category-item');
            if (!item) return;
            dragState = { item: item };
            item.classList.add('dragging');
            document.addEventListener('pointermove', onCatDragMove);
            document.addEventListener('pointerup', onCatDragEnd);
            document.addEventListener('pointercancel', onCatDragEnd);
        }

        function onCatDragMove(e) {
            if (!dragState) return;
            e.preventDefault();
            var list = document.getElementById('categoryList');
            var item = dragState.item;
            var siblings = Array.prototype.filter.call(list.children, function(el) { return el !== item; });

            // 找出目前指標位置該插在誰前面
            var insertBefore = null;
            for (var i = 0; i < siblings.length; i++) {
                var rect = siblings[i].getBoundingClientRect();
                if (e.clientY < rect.top + rect.height / 2) {
                    insertBefore = siblings[i];
                    break;
                }
            }
            if (insertBefore) {
                list.insertBefore(item, insertBefore);
            } else {
                list.appendChild(item);
            }
        }

        async function onCatDragEnd() {
            if (!dragState) return;
            var item = dragState.item;
            item.classList.remove('dragging');
            document.removeEventListener('pointermove', onCatDragMove);
            document.removeEventListener('pointerup', onCatDragEnd);
            document.removeEventListener('pointercancel', onCatDragEnd);
            dragState = null;

            // 讀 DOM 順序 → 更新 categories → 刷新 chips 與下拉 → 存回雲端
            var list = document.getElementById('categoryList');
            var newOrder = Array.prototype.map.call(
                list.querySelectorAll('.category-item-name'),
                function(el) { return el.textContent; });

            if (JSON.stringify(newOrder) === JSON.stringify(categories)) return; // 沒變

            categories = newOrder;
            renderCategoryButtons();
            renderCategorySelect();
            try {
                var result = await apiCall('reorderCategories', { categories: categories });
                if (result.success) {
                    showNotification('分類順序已儲存', 'success');
                } else {
                    showNotification('順序儲存失敗: ' + (result.error || ''), 'error');

                showNotification('順序儲存失敗，僅本次生效', 'error');
            }
        }

        function compressImage(file, maxWidth, quality, callback) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var ratio = Math.min(maxWidth / img.width, maxWidth / img.height, 1);
                    canvas.width = img.width * ratio;
                    canvas.height = img.height * ratio;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ===== 圖片編輯器 =====
        var cropper = null;
        var currentEditSide = null;
        var currentEditType = null; // 'card' or 'avatar'

        function handleCardImage(e, side) {

        // ===== 用 Gemini 回傳的四角座標做透視校正 =====
        // 解 n 元線性方程組（高斯消去）
        function solveLinear(A, b) {
            var n = b.length;
            for (var i = 0; i < n; i++) {
                // 找主元
                var maxRow = i;
                for (var k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) maxRow = k;
                }
                var tmp = A[i]; A[i] = A[maxRow]; A[maxRow] = tmp;
                var tb = b[i]; b[i] = b[maxRow]; b[maxRow] = tb;
                var piv = A[i][i];
                if (Math.abs(piv) < 1e-10) return null;
                for (var j = i; j < n; j++) A[i][j] /= piv;
                b[i] /= piv;
                for (var r = 0; r < n; r++) {
                    if (r === i) continue;
                    var f = A[r][i];
                    for (var c = i; c < n; c++) A[r][c] -= f * A[i][c];
                    b[r] -= f * b[i];
                }
            }
            return b;
        }

        // 求透視變換矩陣 H 使 from 四點映到 to 四點
        function getPerspectiveTransform(from, to) {
            var A = [], b = [];
            for (var i = 0; i < 4; i++) {
                var x = from[i][0], y = from[i][1], u = to[i][0], v = to[i][1];
                A.push([x, y, 1, 0, 0, 0, -x * u, -y * u]); b.push(u);
                A.push([0, 0, 0, x, y, 1, -x * v, -y * v]); b.push(v);
            }
            return solveLinear(A, b); // [a,b,c,d,e,f,g,h]
        }

        // 透視校正：把來源四角拉成正矩形
        function warpPerspective(srcImg, corners, outW, outH) {
            var sc = document.createElement('canvas');
            var sw = srcImg.naturalWidth || srcImg.width;
            var sh = srcImg.naturalHeight || srcImg.height;
            sc.width = sw; sc.height = sh;
            sc.getContext('2d').drawImage(srcImg, 0, 0);
            var srcData = sc.getContext('2d').getImageData(0, 0, sw, sh).data;

            // 目標矩形 → 來源四角，求反向 H
            var dstRect = [[0, 0], [outW, 0], [outW, outH], [0, outH]];
            var srcQuad = [
                [corners.tl.x, corners.tl.y], [corners.tr.x, corners.tr.y],
                [corners.br.x, corners.br.y], [corners.bl.x, corners.bl.y]
            ];
            var H = getPerspectiveTransform(dstRect, srcQuad);
            if (!H) return null;

            var out = document.createElement('canvas');
            out.width = outW; out.height = outH;
            var octx = out.getContext('2d');
            var outImg = octx.createImageData(outW, outH);
            var od = outImg.data;

            for (var y = 0; y < outH; y++) {
                for (var x = 0; x < outW; x++) {
                    var denom = H[6] * x + H[7] * y + 1;
                    var fx = (H[0] * x + H[1] * y + H[2]) / denom;
                    var fy = (H[3] * x + H[4] * y + H[5]) / denom;
                    var xi = fx | 0, yi = fy | 0;
                    var di = (y * outW + x) * 4;
                    if (xi >= 0 && xi < sw && yi >= 0 && yi < sh) {
                        var si = (yi * sw + xi) * 4;
                        od[di] = srcData[si]; od[di + 1] = srcData[si + 1];
                        od[di + 2] = srcData[si + 2]; od[di + 3] = 255;
                    } else {
                        od[di] = 255; od[di + 1] = 255; od[di + 2] = 255; od[di + 3] = 255;
                    }
                }
            }
            octx.putImageData(outImg, 0, 0);
            return out;
        }

        // 驗證四角是否合理（凸、面積夠大）
        function validateCorners(corners, imgW, imgH) {
            if (!corners || !corners.tl || !corners.tr || !corners.br || !corners.bl) return false;
            var pts = [corners.tl, corners.tr, corners.br, corners.bl];
            for (var i = 0; i < 4; i++) {
                if (typeof pts[i].x !== 'number' || typeof pts[i].y !== 'number') return false;
            }
            // 多邊形面積（鞋帶公式）
            var area = 0;
            for (var i = 0; i < 4; i++) {
                var j = (i + 1) % 4;
                area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
            }
            area = Math.abs(area) / 2;
            var ratio = area / (imgW * imgH);
            return ratio > 0.1 && ratio <= 1.05;
        }

        // 對名片正面圖套用 AI 座標校正，回傳 Promise(校正後 dataURL 或 null)
        function applyAiPerspectiveCorrection(imageDataUrl, aiCard) {
            return new Promise(function(resolve) {
                var corners = aiCard.corners;
                if (!corners) { resolve(null); return; }

                var img = new Image();
                img.onload = function() {
                    var actualW = img.naturalWidth, actualH = img.naturalHeight;
                    // 若 AI 用不同尺寸估算，依比例換算座標
                    var refW = aiCard.imgWidth || actualW;
                    var refH = aiCard.imgHeight || actualH;
                    var sx = actualW / refW, sy = actualH / refH;
                    var scaled = {
                        tl: { x: corners.tl.x * sx, y: corners.tl.y * sy },
                        tr: { x: corners.tr.x * sx, y: corners.tr.y * sy },
                        br: { x: corners.br.x * sx, y: corners.br.y * sy },
                        bl: { x: corners.bl.x * sx, y: corners.bl.y * sy }
                    };

                    if (!validateCorners(scaled, actualW, actualH)) {
                        console.warn('AI 座標不合理，跳過校正');
                        resolve(null);
                        return;
                    }

                    // 往外擴張邊距，避免裁到名片邊緣的字（以四角中心為基準各往外推）
                    var MARGIN = 0.06; // 6% 安全邊距
                    var cx = (scaled.tl.x + scaled.tr.x + scaled.br.x + scaled.bl.x) / 4;
                    var cy = (scaled.tl.y + scaled.tr.y + scaled.br.y + scaled.bl.y) / 4;
                    function expand(p) {
                        var nx = cx + (p.x - cx) * (1 + MARGIN);
                        var ny = cy + (p.y - cy) * (1 + MARGIN);
                        // 限制在圖片範圍內
                        return {
                            x: Math.max(0, Math.min(actualW, nx)),
                            y: Math.max(0, Math.min(actualH, ny))
                        };
                    }
                    scaled = {
                        tl: expand(scaled.tl), tr: expand(scaled.tr),
                        br: expand(scaled.br), bl: expand(scaled.bl)
                    };

                    // 計算輸出尺寸
                    var wTop = Math.hypot(scaled.tr.x - scaled.tl.x, scaled.tr.y - scaled.tl.y);
                    var wBot = Math.hypot(scaled.br.x - scaled.bl.x, scaled.br.y - scaled.bl.y);
                    var hL = Math.hypot(scaled.bl.x - scaled.tl.x, scaled.bl.y - scaled.tl.y);
                    var hR = Math.hypot(scaled.br.x - scaled.tr.x, scaled.br.y - scaled.tr.y);
                    var outW = Math.round(Math.max(wTop, wBot));
                    var outH = Math.round(Math.max(hL, hR));
                    var scale = Math.min(1, 1400 / Math.max(outW, outH));
                    outW = Math.round(outW * scale); outH = Math.round(outH * scale);
                    if (outW < 100 || outH < 60) { resolve(null); return; }

                    try {
                        var canvas = warpPerspective(img, scaled, outW, outH);
                        if (!canvas) { resolve(null); return; }
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    } catch (err) {
                        console.warn('透視校正失敗:', err);
                        resolve(null);
                    }
                };
                img.onerror = function() { resolve(null); };
                img.src = imageDataUrl;
            });
        }

        // ===== 雲端同步 =====
        async function syncFromCloud() {
            var dot = document.getElementById('syncDot');
            var text = document.getElementById('syncText');
            dot.className = 'sync-dot syncing';
            text.textContent = '同步中...';

            try {
                var result = await apiGet();
                if (result.success && result.data) {
                    var str = function(val) { return val === null || val === undefined ? '' : String(val); };
                    cards = result.data.map(function(row) {
                        return {
                            id: str(row['ID']) || String(Date.now()),
                            name: str(row['姓名']),
                            nameEn: str(row['英文名']),
                            company: str(row['公司']),
                            title: str(row['職稱']),
                            mobile: str(row['行動電話']),
                            mobile2: str(row['行動電話2']),
                            phone: str(row['電話']),
                            fax: str(row['傳真']),
                            taxId: str(row['統編']),
                            email: str(row['Email']),
                            lineId: str(row['LINE_ID']),
                            category: str(row['分類']) || '其他',
                            address: str(row['地址']),
                            website: str(row['網站']),
                            notes: str(row['備註']),

                            cardBackUrl: str(row['名片背面']),
                            avatarUrl: str(row['大頭照'])
                        };
                    });
                    saveToLocal();
                    renderCards();
                    showNotification('✅ 同步成功！' + cards.length + ' 筆', 'success');
                    dot.className = 'sync-dot online';
                    text.textContent = '已連線';
                } else {
                    throw new Error(result.error || '同步失敗');
                }
            } catch (err) {
                console.error('同步錯誤:', err);
                showNotification('同步失敗: ' + err.message, 'error');
                dot.className = 'sync-dot';
                text.textContent = '離線';
                renderCards();
            }
        }

        async function uploadImageToDrive(base64Data, fileName) {
            if (!base64Data) return '';
            try {
                var base64Content = base64Data.split(',')[1];
                var mimeType = base64Data.match(/data:(.*?);/)[1];
                var result = await apiCall('uploadImage', {
                    fileName: fileName,
                    base64Data: base64Content,
                    mimeType: mimeType
                });
                return result.success ? result.url : '';
            } catch (err) {
                console.error('上傳錯誤:', err);
                return '';
            }
        }

        // 轉換 Google Drive URL 為可顯示的格式
        function getDriveImageUrl(url) {
            if (!url) return '';
            // 如果是 drive.google.com/uc?id=xxx 格式
            var match = url.match(/[?&]id=([^&]+)/);
            if (match) {
                return 'https://lh3.googleusercontent.com/d/' + match[1];
            }
            // 如果是 drive.google.com/file/d/xxx 格式
            match = url.match(/\/d\/([^\/]+)/);
            if (match) {
                return 'https://lh3.googleusercontent.com/d/' + match[1];
            }
            return url;
        }

                    (card.company && card.company.toLowerCase().includes(search)) ||
                    (card.lineId && card.lineId.toLowerCase().includes(search)) ||
                    (card.notes && card.notes.toLowerCase().includes(search));
                var matchCat = currentCategory === '全部' || card.category === currentCategory;
                return matchSearch && matchCat;
            });

            document.getElementById('totalCount').textContent = cards.length;
            document.getElementById('lineCount').textContent = cards.filter(function(c) { return c.lineId; }).length;
            document.getElementById('filterCount').textContent = filtered.length;

            if (filtered.length === 0) {

                    (cards.length === 0 ? '還沒有名片' : '找不到符合的名片') + '</h3></div>';
                return;

            grid.innerHTML = filtered.map(function(card) {

                var backImg = getDriveImageUrl(card.cardBackUrl);

                    '<div class="card-header">' +

            if (!card) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '編輯名片';
            
            document.getElementById('cardName').value = card.name || '';
            document.getElementById('cardNameEn').value = card.nameEn || '';
            document.getElementById('cardCompany').value = card.company || '';
            document.getElementById('cardTitle').value = card.title || '';
            document.getElementById('cardMobile').value = card.mobile || '';
            document.getElementById('cardMobile2').value = card.mobile2 || '';
            document.getElementById('cardPhone').value = card.phone || '';
            document.getElementById('cardFax').value = card.fax || '';
            document.getElementById('cardTaxId').value = card.taxId || '';
            document.getElementById('cardEmail').value = card.email || '';
            document.getElementById('cardLine').value = card.lineId || '';
            document.getElementById('cardCategory').value = card.category || categories[0];
            document.getElementById('cardAddress').value = card.address || '';
            document.getElementById('cardWebsite').value = card.website || '';
            document.getElementById('cardNotes').value = card.notes || '';

            cardFrontUrl = card.cardFrontUrl || '';
            cardBackUrl = card.cardBackUrl || '';
            avatarUrl = card.avatarUrl || '';
            cardFrontImage = null;
            cardBackImage = null;
            cardFrontOriginal = null;
            cardBackOriginal = null;
            avatarImage = null;

            if (cardFrontUrl) {
                document.getElementById('cardFrontBox').innerHTML = '<img src="' + getDriveImageUrl(cardFrontUrl) + '" alt="正面">';
                document.getElementById('cardFrontBox').classList.add('has-image');
            } else {
                document.getElementById('cardFrontBox').innerHTML = '<span class="image-box-icon">📄</span><span class="image-box-label">正面</span>';
                document.getElementById('cardFrontBox').classList.remove('has-image');
            }
            if (cardBackUrl) {
                document.getElementById('cardBackBox').innerHTML = '<img src="' + getDriveImageUrl(cardBackUrl) + '" alt="背面">';
                document.getElementById('cardBackBox').classList.add('has-image');
            } else {
                document.getElementById('cardBackBox').innerHTML = '<span class="image-box-icon">📄</span><span class="image-box-label">背面</span>';
                document.getElementById('cardBackBox').classList.remove('has-image');
            }
            if (avatarUrl) {
                document.getElementById('avatarPreview').style.backgroundImage = 'url("' + getDriveImageUrl(avatarUrl) + '")';
                document.getElementById('avatarPreview').classList.add('has-image');
                document.getElementById('avatarPreview').textContent = '';
            } else {
                document.getElementById('avatarPreview').style.backgroundImage = '';
                document.getElementById('avatarPreview').classList.remove('has-image');
                document.getElementById('avatarPreview').textContent = '👤';
            }

            document.getElementById('ocrResult').classList.remove('active');
            closeDetailModal();
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function deleteCard(id) {
            if (!confirm('確定刪除這張名片？')) return;
            showLoading('刪除中...');
            try {
                var result = await apiCall('delete', { id: id });
                if (result.success) {
                    showNotification('🗑️ 已刪除', 'success');
                    closeDetailModal();
                    await syncFromCloud();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showNotification('刪除失敗: ' + err.message, 'error');
            }
            hideLoading();
        }

        // ===== AI 名片辨識（Gemini）=====
        async function recognizeCard() {
            if (!cardFrontImage) return;

            var btn = document.getElementById('recognizeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> AI 辨識中';
            showLoading('🤖 AI 辨識中，請稍候...');

            try {
                var base64Content = cardFrontImage.split(',')[1];
                var mimeType = (cardFrontImage.match(/data:(.*?);/) || [])[1] || 'image/jpeg';
                var result = await apiCall('aiRecognize', { base64Image: base64Content, mimeType: mimeType });

                if (result.success && result.card) {
                    fillFormFromAI(result.card);
                    renderAiSummary(result.card);
                    document.getElementById('ocrResult').classList.add('active');

                    // 用 AI 回傳的四角座標自動校正名片正面圖
                    if (result.card.corners) {
                        showLoading('📐 校正名片中...');
                        var corrected = await applyAiPerspectiveCorrection(cardFrontImage, result.card);
                        if (corrected) {
                            cardFrontImage = corrected;
                            cardFrontUrl = ''; // 已變更，需重新上傳
                            var box = document.getElementById('cardFrontBox');
                            box.innerHTML = '<img src="' + corrected + '" alt="名片">';
                            box.classList.add('has-image');
                            showNotification('🤖 辨識完成，已自動校正名片', 'success');
                        } else {
                            showNotification('🤖 辨識完成（自動校正略過）', 'success');
                        }
                    } else {
                        showNotification('🤖 AI 辨識完成，已填入表單', 'success');
                    }
                } else {
                    throw new Error(result.error || 'AI 無法辨識');
                }
            } catch (err) {
                console.error('AI 辨識錯誤:', err);
                showNotification('AI 辨識失敗: ' + err.message, 'error');
            }

            hideLoading();
            btn.disabled = false;
            btn.innerHTML = '🤖 AI 辨識';
        }

        // 把 AI 回傳的結構化資料填入表單
        function fillFormFromAI(c) {
            // 行動電話可能有多支（AI 用 / 分隔），自動拆成兩欄
            var mobile1 = c.mobile || '';
            var mobile2 = '';
            if (mobile1.indexOf('/') !== -1) {
                var parts = mobile1.split('/').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
                mobile1 = parts[0] || '';
                mobile2 = parts.slice(1).join(' / ');
            }

            var map = {
                cardName: c.name, cardNameEn: c.nameEn, cardCompany: c.company,
                cardTitle: c.title, cardMobile: mobile1, cardMobile2: mobile2,
                cardPhone: c.phone, cardFax: c.fax, cardTaxId: c.taxId,
                cardEmail: c.email, cardLine: c.line, cardWebsite: c.website,
                cardAddress: c.address
            };
            Object.keys(map).forEach(function(id) {
                var el = document.getElementById(id);
                if (el && map[id]) {
                    el.value = map[id];
                    el.style.backgroundColor = 'rgba(47, 159, 121, 0.22)';
                    setTimeout(function() { el.style.backgroundColor = ''; }, 1000);
                }
            });
            if (c.notes) {
                var notesEl = document.getElementById('cardNotes');
                if (notesEl && !notesEl.value) notesEl.value = c.notes;
            }
        }

        // 顯示 AI 辨識摘要
        function renderAiSummary(c) {
            var rows = [
                ['姓名', c.name], ['英文名', c.nameEn], ['公司', c.company],
                ['職稱', c.title], ['行動', c.mobile], ['市話', c.phone],
                ['傳真', c.fax], ['統編', c.taxId], ['Email', c.email],
                ['LINE', c.line], ['網站', c.website], ['地址', c.address],
                ['備註', c.notes]
            ];
            var html = rows.filter(function(r) { return r[1]; }).map(function(r) {
                return '<div class="ai-summary-row"><span class="ai-summary-label">' + r[0] +
                    '</span><span class="ai-summary-value">' + escapeHtml(r[1]) + '</span></div>';
            }).join('');
            document.getElementById('aiSummary').innerHTML = html || '<div style="color:var(--text-muted)">未擷取到資料</div>';
        }


        // ===== 工具 =====
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ===== 事件 =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddModal();
                closeDetailModal();
                closeCategoryModal();
                closeShareModal();
            }
        });

        document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeAddModal(); });
        document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeDetailModal(); });
        document.getElementById('categoryModal').addEventListener('click', function(e) { if (e.target === this) closeCategoryModal(); });
        document.getElementById('shareModal').addEventListener('click', function(e) { if (e.target === this) closeShareModal(); });
    </script>
</body>
</html>
