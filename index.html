<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0f172a">
    <title>名片管理中心</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <style>
        :root {
            --primary: #06d6a0;
            --primary-dark: #00b890;
            --accent: #3b82f6;
            --bg-dark: #0f172a;
            --bg-card: rgba(255,255,255,0.06);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border: rgba(255,255,255,0.1);
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
            min-height: 100vh;
            color: var(--text-primary);
            overflow-x: hidden;
            padding-bottom: env(safe-area-inset-bottom);
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 20%, rgba(6, 214, 160, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(59, 130, 246, 0.08) 0%, transparent 40%);
            pointer-events: none;
            z-index: 0;
        }

        .header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 12px 16px;
            padding-top: calc(12px + env(safe-area-inset-top));
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            gap: 10px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text h1 { font-size: 18px; font-weight: 700; }
        .logo-text p { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

        .header-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .btn {
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
            border: none;
            font-family: inherit;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-icon {
            padding: 8px;
            min-width: 36px;
            justify-content: center;
        }

        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .search-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 180px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
        }

        .search-box input:focus { border-color: var(--primary); }
        .search-box input::placeholder { color: var(--text-muted); }
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
        }

        .categories {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            align-items: center;
        }

        .category-btn {
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            background: rgba(255,255,255,0.08);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            border-color: transparent;
            font-weight: 600;
        }

        .category-manage-btn {
            padding: 6px 10px;
            border-radius: 16px;
            font-size: 12px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            color: var(--text-muted);
            border: 1px dashed var(--border);
        }

        .main {
            padding: 16px;
            position: relative;
            z-index: 1;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 12px;
            border: 1px solid var(--border);
            text-align: center;
        }

        .stat-label { font-size: 11px; color: var(--text-secondary); margin-bottom: 4px; }
        .stat-value { font-size: 24px; font-weight: 700; }
        .stat-value.primary { color: var(--primary); }
        .stat-value.accent { color: var(--accent); }

        .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }

        .card {
            background: var(--bg-card);
            border-radius: 14px;
            padding: 16px;
            border: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
            border-color: rgba(6, 214, 160, 0.3);
        }

        .card-category {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 3px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 600;
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .card-avatar {
            width: 46px;
            height: 46px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .card-name { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
        .card-name-en { font-size: 12px; color: var(--text-muted); }
        .card-title { font-size: 12px; color: var(--text-secondary); }
        .card-company { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        .card-contacts { display: flex; flex-direction: column; gap: 6px; }
        .card-contact { font-size: 12px; color: var(--text-secondary); display: flex; align-items: center; gap: 6px; }

        .card-line {
            background: rgba(6, 214, 160, 0.1);
            padding: 6px 10px;
            border-radius: 6px;
            border: 1px solid rgba(6, 214, 160, 0.2);
            color: var(--primary);
            font-weight: 500;
        }

        .card-images {
            display: flex;
            gap: 6px;
            margin-top: 10px;
        }

        .card-image-thumb {
            flex: 1;
            height: 50px;
            border-radius: 6px;
            background-size: cover;
            background-position: center;
            border: 1px solid var(--border);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: flex-start;
            justify-content: center;
            z-index: 200;
            padding: 20px;
            padding-top: calc(20px + env(safe-area-inset-top));
            overflow-y: auto;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-radius: 16px;
            padding: 20px;
            width: 100%;
            max-width: 480px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .modal-header h2 { font-size: 18px; font-weight: 700; }

        .modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            border: none;
            color: var(--text-secondary);
            font-size: 16px;
            cursor: pointer;
        }

        .form-group { margin-bottom: 12px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .form-label { display: block; font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            background: rgba(255,255,255,0.08);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus { border-color: var(--primary); }
        .form-input::placeholder { color: var(--text-muted); }
        .form-input.highlight { background: rgba(6, 214, 160, 0.1); border-color: rgba(6, 214, 160, 0.3); }
        textarea.form-input { resize: vertical; min-height: 60px; }

        .form-input-row {
            display: flex;
            gap: 8px;
        }

        .form-input-row .form-input { flex: 1; }

        .form-input-row .btn {
            padding: 10px 12px;
            flex-shrink: 0;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            margin-top: 16px;
        }

        .form-actions .btn {
            flex: 1;
            justify-content: center;
            padding: 12px;
        }

        /* 圖片上傳區 */
        .image-section {
            margin-bottom: 14px;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            border: 1px dashed var(--border);
        }

        .image-section-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .image-row {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        .image-box {
            flex: 1;
            aspect-ratio: 16/10;
            border-radius: 8px;
            background: rgba(255,255,255,0.06);
            border: 2px dashed var(--border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        .image-box.has-image {
            border-style: solid;
            border-color: var(--primary);
        }

        .image-box img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-box-label {
            font-size: 11px;
            color: var(--text-muted);
            text-align: center;
        }

        .image-box-icon {
            font-size: 24px;
            margin-bottom: 4px;
        }

        .image-btns {
            display: flex;
            gap: 8px;
        }

        .image-btn {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            font-size: 12px;
            cursor: pointer;
            font-family: inherit;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .image-btn.camera { background: linear-gradient(135deg, var(--accent), #2563eb); color: white; }
        .image-btn.gallery { background: rgba(255,255,255,0.1); color: var(--text-primary); border: 1px solid var(--border); }
        .image-btn.recognize { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
        .image-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        /* 大頭照 */
        .avatar-section {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            padding: 12px;
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
        }

        .avatar-preview {
            width: 60px;
            height: 60px;
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            background-size: cover;
            background-position: center;
            border: 2px dashed var(--border);
            flex-shrink: 0;
        }

        .avatar-preview.has-image { border-style: solid; border-color: var(--primary); }
        .avatar-info { flex: 1; }
        .avatar-info h4 { font-size: 13px; margin-bottom: 3px; }
        .avatar-info p { font-size: 11px; color: var(--text-muted); margin-bottom: 6px; }

        .avatar-btns {
            display: flex;
            gap: 6px;
        }

        .avatar-btn {
            padding: 6px 10px;
            background: rgba(255,255,255,0.1);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-primary);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }

        /* OCR 結果 - 可選擇欄位 */
        .ocr-result {
            margin-top: 10px;
            padding: 12px;
            background: rgba(6, 214, 160, 0.1);
            border-radius: 8px;
            border: 1px solid rgba(6, 214, 160, 0.2);
            display: none;
        }

        .ocr-result.active { display: block; }
        
        .ocr-result h4 { 
            color: var(--primary); 
            margin-bottom: 8px; 
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .ocr-lines {
            max-height: 280px;
            overflow-y: auto;
        }

        .ocr-line {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            margin-bottom: 6px;
            background: rgba(0,0,0,0.25);
            border-radius: 8px;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: all 0.2s;
        }

        .ocr-line.assigned {
            border-left-color: var(--primary);
            background: rgba(6, 214, 160, 0.08);
        }

        .ocr-line.ignored {
            opacity: 0.4;
        }

        .ocr-line-text {
            flex: 1;
            word-break: break-all;
            line-height: 1.3;
        }

        .ocr-line-select {
            flex-shrink: 0;
            padding: 6px 8px;
            border-radius: 6px;
            font-size: 12px;
            font-family: inherit;
            background: rgba(255,255,255,0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
            cursor: pointer;
            outline: none;
            min-width: 80px;
        }

        .ocr-line-select:focus {
            border-color: var(--primary);
        }

        .ocr-line.assigned .ocr-line-select {
            background: rgba(6, 214, 160, 0.2);
            border-color: var(--primary);
            color: var(--primary);
            font-weight: 600;
        }

        .ocr-apply-bar {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .ai-summary {
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.6;
            max-height: 200px;
            overflow-y: auto;
        }

        .ai-summary-row {
            display: flex;
            gap: 8px;
            padding: 4px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        .ai-summary-label {
            color: var(--primary);
            min-width: 60px;
            font-weight: 600;
        }

        .ai-summary-value {
            flex: 1;
            color: var(--text-primary);
            word-break: break-all;
        }

        .ocr-apply-bar button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            font-family: inherit;
        }

        .ocr-apply-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
        }

        .ocr-rescan-btn {
            background: rgba(255,255,255,0.1);
            color: var(--text-secondary);
            border: 1px solid var(--border) !important;
        }

        /* 詳細頁 */
        .detail-header { display: flex; gap: 12px; margin-bottom: 14px; }

        .detail-avatar {
            width: 65px;
            height: 65px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            background-size: cover;
            background-position: center;
            flex-shrink: 0;
        }

        .detail-info h2 { font-size: 22px; margin-bottom: 2px; }
        .detail-info .name-en { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
        .detail-info p { color: var(--text-secondary); font-size: 13px; }

        .detail-category {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 600;
            margin-top: 5px;
            background: rgba(255,255,255,0.1);
        }

        .detail-images {
            display: flex;
            gap: 8px;
            margin-bottom: 14px;
        }

        .detail-image {
            flex: 1;
            border-radius: 10px;
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .detail-image img {
            width: 100%;
            display: block;
        }

        .detail-image-label {
            font-size: 10px;
            color: var(--text-muted);
            text-align: center;
            padding: 4px;
            background: rgba(0,0,0,0.3);
        }

        .detail-section {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .detail-row {
            display: flex;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }

        .detail-row:last-child { border-bottom: none; }
        .detail-row-icon { font-size: 14px; margin-right: 8px; }
        .detail-row-label { width: 55px; font-size: 11px; color: var(--text-muted); }
        .detail-row-value { flex: 1; font-size: 13px; word-break: break-all; }
        .detail-row-value a { color: var(--text-primary); text-decoration: none; }
        .detail-row-value a:hover { color: var(--primary); }
        .detail-row-value.line { color: var(--primary); font-weight: 500; }

        .detail-notes { background: rgba(255,255,255,0.04); border-radius: 10px; padding: 12px; margin-bottom: 12px; }
        .detail-notes h4 { font-size: 12px; color: var(--text-secondary); margin-bottom: 5px; }
        .detail-notes p { font-size: 13px; line-height: 1.5; }

        .empty-state { text-align: center; padding: 50px 20px; color: var(--text-muted); }
        .empty-state-icon { font-size: 45px; margin-bottom: 12px; opacity: 0.5; }
        .empty-state h3 { font-size: 15px; margin-bottom: 6px; color: var(--text-secondary); }

        .notification {
            position: fixed;
            top: calc(10px + env(safe-area-inset-top));
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            z-index: 300;
            transition: transform 0.3s;
            font-size: 13px;
            max-width: 90%;
            text-align: center;
        }

        .notification.active { transform: translateX(-50%) translateY(0); }
        .notification.error { background: var(--danger); }
        .notification.success { background: var(--success); }

        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .sync-status { font-size: 10px; color: var(--text-muted); display: flex; align-items: center; gap: 4px; }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-muted); }
        .sync-dot.online { background: var(--success); }
        .sync-dot.syncing { background: var(--accent); animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .hidden-input { display: none; }

        .loading-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 16px;
            z-index: 400;
        }

        .loading-overlay.active { display: flex; }
        .loading-overlay .loading { width: 40px; height: 40px; border-width: 3px; }
        .loading-overlay p { color: var(--text-secondary); font-size: 14px; }

        /* 分類管理 Modal */
        .category-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .category-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 12px;
            background: rgba(255,255,255,0.05);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .category-item-name {
            font-size: 14px;
        }

    <script>
        // ===== API 設定 =====
        const API_URL = 'https://script.google.com/macros/s/AKfycbxsDT1GpMUWkLTh8HQIB6QMVOM6aMXS2IvBy1hpWy_y5mgyOakb__p0XQm1cn2q6N0LVQ/exec';

        // ===== 全域變數 =====
        let cards = [];
        let categories = ['客戶', '供應商', '合作夥伴', '同事', '朋友', '其他'];
        let currentCategory = '全部';
        let cardFrontImage = null;
        let cardBackImage = null;
        let avatarImage = null;
        let cardFrontUrl = '';
        let cardBackUrl = '';
        let avatarUrl = '';
        let editingId = null;

        // ===== 初始化 =====
        document.addEventListener('DOMContentLoaded', function() {
            console.log('App v6 初始化...');
            initFileInputs();
            loadFromLocal();
            loadCategories();
            syncFromCloud();
        });

        // ===== 載入分類 =====
        async function loadCategories() {
            try {
                var response = await fetch(API_URL + '?type=categories');
                var result = await response.json();
                if (result.success && result.categories) {
                    categories = result.categories;
                    localStorage.setItem('categories_v6', JSON.stringify(categories));
                }
            } catch (err) {
                console.error('載入分類失敗:', err);
                var saved = localStorage.getItem('categories_v6');
                if (saved) {
                    categories = JSON.parse(saved);
                }
            }
            renderCategoryButtons();
            renderCategorySelect();
        }

        function renderCategoryButtons() {
            var container = document.getElementById('categories');
            var btns = '<button class="category-btn active" data-cat="全部" onclick="selectCategory(this)">全部</button>';
            for (var i = 0; i < categories.length; i++) {
                btns += '<button class="category-btn" data-cat="' + categories[i] + '" onclick="selectCategory(this)">' + categories[i] + '</button>';
            }
            btns += '<button class="category-manage-btn" onclick="openCategoryModal()">⚙️</button>';
            container.innerHTML = btns;
        }

        function renderCategorySelect() {
            var select = document.getElementById('cardCategory');
            select.innerHTML = categories.map(function(c) {
                return '<option value="' + c + '">' + c + '</option>';
            }).join('');
        }

        // ===== 分類管理 =====
        function openCategoryModal() {
            renderCategoryList();
            document.getElementById('categoryModal').classList.add('active');
            document.getElementById('newCategoryInput').value = '';
        }

        function closeCategoryModal() {
            document.getElementById('categoryModal').classList.remove('active');

        function renderCategoryList() {
            var list = document.getElementById('categoryList');
            list.innerHTML = categories.map(function(c) {
                return '<div class="category-item">' +
                    '<span class="category-item-name">' + escapeHtml(c) + '</span>' +
                    '<button class="category-item-delete" onclick="deleteCategory(\'' + escapeHtml(c) + '\')">🗑️</button>' +
                '</div>';
            }).join('');
        }

        async function addNewCategory() {
            var input = document.getElementById('newCategoryInput');
            var name = input.value.trim();
            if (!name) {
                showNotification('請輸入分類名稱', 'error');
                return;

            showLoading('新增分類...');
            try {
                var result = await apiCall('addCategory', { category: name });
                if (result.success) {
                    showNotification('✅ 分類已新增', 'success');
                    input.value = '';
                    await loadCategories();
                    renderCategoryList();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showNotification('新增失敗: ' + err.message, 'error');
            }
            hideLoading();
        }

        async function deleteCategory(name) {
            if (!confirm('確定刪除「' + name + '」分類？')) return;

            showLoading('刪除分類...');
            try {

        // ===== 顯示/隱藏載入中 =====
        function showLoading(text) {

        // ===== 檔案輸入 =====
        function initFileInputs() {
            document.getElementById('cardFrontCameraInput').addEventListener('change', function(e) { handleCardImage(e, 'front'); });
            document.getElementById('cardFrontGalleryInput').addEventListener('change', function(e) { handleCardImage(e, 'front'); });
            document.getElementById('cardBackCameraInput').addEventListener('change', function(e) { handleCardImage(e, 'back'); });
            document.getElementById('cardBackGalleryInput').addEventListener('change', function(e) { handleCardImage(e, 'back'); });
            document.getElementById('avatarCameraInput').addEventListener('change', handleAvatarImage);
            document.getElementById('avatarGalleryInput').addEventListener('change', handleAvatarImage);
        }

        function compressImage(file, maxWidth, quality, callback) {
            var reader = new FileReader();
            reader.onload = function(e) {
                var img = new Image();
                img.onload = function() {
                    var canvas = document.createElement('canvas');
                    var ratio = Math.min(maxWidth / img.width, maxWidth / img.height, 1);
                    canvas.width = img.width * ratio;
                    canvas.height = img.height * ratio;
                    var ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    callback(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        // ===== 圖片編輯器 =====
        var cropper = null;
        var currentEditSide = null;
        var currentEditType = null; // 'card' or 'avatar'

        function handleCardImage(e, side) {
            var file = e.target.files[0];
            if (!file) return;
            e.target.value = ''; // 清除 input 讓同張圖可以重選

            var reader = new FileReader();
            reader.onload = function(evt) {
                openImageEditor(evt.target.result, 'card', side);
            };
            reader.readAsDataURL(file);
        }

        // ===== 用 Gemini 回傳的四角座標做透視校正 =====
        // 解 n 元線性方程組（高斯消去）
        function solveLinear(A, b) {
            var n = b.length;
            for (var i = 0; i < n; i++) {
                // 找主元
                var maxRow = i;
                for (var k = i + 1; k < n; k++) {
                    if (Math.abs(A[k][i]) > Math.abs(A[maxRow][i])) maxRow = k;
                }
                var tmp = A[i]; A[i] = A[maxRow]; A[maxRow] = tmp;
                var tb = b[i]; b[i] = b[maxRow]; b[maxRow] = tb;
                var piv = A[i][i];
                if (Math.abs(piv) < 1e-10) return null;
                for (var j = i; j < n; j++) A[i][j] /= piv;
                b[i] /= piv;
                for (var r = 0; r < n; r++) {
                    if (r === i) continue;
                    var f = A[r][i];
                    for (var c = i; c < n; c++) A[r][c] -= f * A[i][c];
                    b[r] -= f * b[i];
                }
            }
            return b;
        }

        // 求透視變換矩陣 H 使 from 四點映到 to 四點
        function getPerspectiveTransform(from, to) {
            var A = [], b = [];
            for (var i = 0; i < 4; i++) {
                var x = from[i][0], y = from[i][1], u = to[i][0], v = to[i][1];
                A.push([x, y, 1, 0, 0, 0, -x * u, -y * u]); b.push(u);
                A.push([0, 0, 0, x, y, 1, -x * v, -y * v]); b.push(v);
            }
            return solveLinear(A, b); // [a,b,c,d,e,f,g,h]
        }

        // 透視校正：把來源四角拉成正矩形
        function warpPerspective(srcImg, corners, outW, outH) {
            var sc = document.createElement('canvas');
            var sw = srcImg.naturalWidth || srcImg.width;
            var sh = srcImg.naturalHeight || srcImg.height;
            sc.width = sw; sc.height = sh;
            sc.getContext('2d').drawImage(srcImg, 0, 0);
            var srcData = sc.getContext('2d').getImageData(0, 0, sw, sh).data;

            // 目標矩形 → 來源四角，求反向 H
            var dstRect = [[0, 0], [outW, 0], [outW, outH], [0, outH]];
            var srcQuad = [
                [corners.tl.x, corners.tl.y], [corners.tr.x, corners.tr.y],
                [corners.br.x, corners.br.y], [corners.bl.x, corners.bl.y]
            ];
            var H = getPerspectiveTransform(dstRect, srcQuad);
            if (!H) return null;

            var out = document.createElement('canvas');
            out.width = outW; out.height = outH;
            var octx = out.getContext('2d');
            var outImg = octx.createImageData(outW, outH);
            var od = outImg.data;

            for (var y = 0; y < outH; y++) {
                for (var x = 0; x < outW; x++) {
                    var denom = H[6] * x + H[7] * y + 1;
                    var fx = (H[0] * x + H[1] * y + H[2]) / denom;
                    var fy = (H[3] * x + H[4] * y + H[5]) / denom;
                    var xi = fx | 0, yi = fy | 0;
                    var di = (y * outW + x) * 4;
                    if (xi >= 0 && xi < sw && yi >= 0 && yi < sh) {
                        var si = (yi * sw + xi) * 4;
                        od[di] = srcData[si]; od[di + 1] = srcData[si + 1];
                        od[di + 2] = srcData[si + 2]; od[di + 3] = 255;
                    } else {
                        od[di] = 255; od[di + 1] = 255; od[di + 2] = 255; od[di + 3] = 255;
                    }
                }
            }
            octx.putImageData(outImg, 0, 0);
            return out;
        }

        // 驗證四角是否合理（凸、面積夠大）
        function validateCorners(corners, imgW, imgH) {
            if (!corners || !corners.tl || !corners.tr || !corners.br || !corners.bl) return false;
            var pts = [corners.tl, corners.tr, corners.br, corners.bl];
            for (var i = 0; i < 4; i++) {
                if (typeof pts[i].x !== 'number' || typeof pts[i].y !== 'number') return false;
            }
            // 多邊形面積（鞋帶公式）
            var area = 0;
            for (var i = 0; i < 4; i++) {
                var j = (i + 1) % 4;
                area += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
            }
            area = Math.abs(area) / 2;
            var ratio = area / (imgW * imgH);
            return ratio > 0.1 && ratio <= 1.05;
        }

        // 對名片正面圖套用 AI 座標校正，回傳 Promise(校正後 dataURL 或 null)
        function applyAiPerspectiveCorrection(imageDataUrl, aiCard) {
            return new Promise(function(resolve) {
                var corners = aiCard.corners;
                if (!corners) { resolve(null); return; }

                var img = new Image();
                img.onload = function() {
                    var actualW = img.naturalWidth, actualH = img.naturalHeight;
                    // 若 AI 用不同尺寸估算，依比例換算座標
                    var refW = aiCard.imgWidth || actualW;
                    var refH = aiCard.imgHeight || actualH;
                    var sx = actualW / refW, sy = actualH / refH;
                    var scaled = {
                        tl: { x: corners.tl.x * sx, y: corners.tl.y * sy },
                        tr: { x: corners.tr.x * sx, y: corners.tr.y * sy },
                        br: { x: corners.br.x * sx, y: corners.br.y * sy },
                        bl: { x: corners.bl.x * sx, y: corners.bl.y * sy }
                    };

                    if (!validateCorners(scaled, actualW, actualH)) {
                        console.warn('AI 座標不合理，跳過校正');
                        resolve(null);
                        return;
                    }

                    // 計算輸出尺寸
                    var wTop = Math.hypot(scaled.tr.x - scaled.tl.x, scaled.tr.y - scaled.tl.y);
                    var wBot = Math.hypot(scaled.br.x - scaled.bl.x, scaled.br.y - scaled.bl.y);
                    var hL = Math.hypot(scaled.bl.x - scaled.tl.x, scaled.bl.y - scaled.tl.y);
                    var hR = Math.hypot(scaled.br.x - scaled.tr.x, scaled.br.y - scaled.tr.y);
                    var outW = Math.round(Math.max(wTop, wBot));
                    var outH = Math.round(Math.max(hL, hR));
                    var scale = Math.min(1, 1400 / Math.max(outW, outH));
                    outW = Math.round(outW * scale); outH = Math.round(outH * scale);
                    if (outW < 100 || outH < 60) { resolve(null); return; }

                    try {
                        var canvas = warpPerspective(img, scaled, outW, outH);
                        if (!canvas) { resolve(null); return; }
                        resolve(canvas.toDataURL('image/jpeg', 0.9));
                    } catch (err) {
                        console.warn('透視校正失敗:', err);
                        resolve(null);
                    }
                };
                img.onerror = function() { resolve(null); };
                img.src = imageDataUrl;
            });
        }

        // ===== API 呼叫 =====
        async function apiCall(action, data) {

        // ===== 雲端同步 =====
        async function syncFromCloud() {
            var dot = document.getElementById('syncDot');
            var text = document.getElementById('syncText');
            dot.className = 'sync-dot syncing';
            text.textContent = '同步中...';

            try {
                var result = await apiGet();
                if (result.success && result.data) {
                    var str = function(val) { return val === null || val === undefined ? '' : String(val); };
                    cards = result.data.map(function(row) {
                        return {
                            id: str(row['ID']) || String(Date.now()),
                            name: str(row['姓名']),
                            nameEn: str(row['英文名']),
                            company: str(row['公司']),
                            title: str(row['職稱']),
                            mobile: str(row['行動電話']),
                            mobile2: str(row['行動電話2']),
                            phone: str(row['電話']),
                            fax: str(row['傳真']),
                            taxId: str(row['統編']),
                            email: str(row['Email']),
                            lineId: str(row['LINE_ID']),
                            category: str(row['分類']) || '其他',
                            address: str(row['地址']),
                            website: str(row['網站']),
                            notes: str(row['備註']),
                            cardFrontUrl: str(row['名片正面']),
                            cardBackUrl: str(row['名片背面']),
                            avatarUrl: str(row['大頭照'])
                        };
                    });
                    saveToLocal();
                    renderCards();
                    showNotification('✅ 同步成功！' + cards.length + ' 筆', 'success');
                    dot.className = 'sync-dot online';
                    text.textContent = '已連線';
                } else {
                    throw new Error(result.error || '同步失敗');
                }
            } catch (err) {
                console.error('同步錯誤:', err);
                showNotification('同步失敗: ' + err.message, 'error');
                dot.className = 'sync-dot';
                text.textContent = '離線';
                renderCards();
            }
        }

        async function uploadImageToDrive(base64Data, fileName) {
            if (!base64Data) return '';
            try {
                var base64Content = base64Data.split(',')[1];
                var mimeType = base64Data.match(/data:(.*?);/)[1];
                var result = await apiCall('uploadImage', {
                    fileName: fileName,
                    base64Data: base64Content,
                    mimeType: mimeType
                });
                return result.success ? result.url : '';
            } catch (err) {
                console.error('上傳錯誤:', err);
                return '';
            }
        }

        // 轉換 Google Drive URL 為可顯示的格式
        function getDriveImageUrl(url) {
            if (!url) return '';
            // 如果是 drive.google.com/uc?id=xxx 格式
            var match = url.match(/[?&]id=([^&]+)/);
            if (match) {
                return 'https://lh3.googleusercontent.com/d/' + match[1];
            }
            // 如果是 drive.google.com/file/d/xxx 格式
            match = url.match(/\/d\/([^\/]+)/);
            if (match) {
                return 'https://lh3.googleusercontent.com/d/' + match[1];
            }
            return url;
        }

        // ===== 渲染名片 =====
        function renderCards() {
            var grid = document.getElementById('cardsGrid');
            var search = document.getElementById('searchInput').value.toLowerCase();
            
            var filtered = cards.filter(function(card) {
                var matchSearch = !search || 
                    (card.name && card.name.toLowerCase().includes(search)) ||
                    (card.nameEn && card.nameEn.toLowerCase().includes(search)) ||
                    (card.company && card.company.toLowerCase().includes(search)) ||
                    (card.lineId && card.lineId.toLowerCase().includes(search)) ||
                    (card.notes && card.notes.toLowerCase().includes(search));
                var matchCat = currentCategory === '全部' || card.category === currentCategory;
                return matchSearch && matchCat;
            });

            document.getElementById('totalCount').textContent = cards.length;
            document.getElementById('lineCount').textContent = cards.filter(function(c) { return c.lineId; }).length;
            document.getElementById('filterCount').textContent = filtered.length;

            if (filtered.length === 0) {
                grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">📭</div><h3>' + 
                    (cards.length === 0 ? '還沒有名片' : '找不到符合的名片') + '</h3></div>';
                return;
            }

            grid.innerHTML = filtered.map(function(card) {
                var avatarImg = getDriveImageUrl(card.avatarUrl);
                var frontImg = getDriveImageUrl(card.cardFrontUrl);
                var backImg = getDriveImageUrl(card.cardBackUrl);
                var avatarStyle = avatarImg ? 'background-image:url("' + avatarImg + '");' : '';
                var hasImages = frontImg || backImg;
                
                return '<div class="card" onclick="openDetailModal(\'' + card.id + '\')">' +
                    '<span class="card-category">' + escapeHtml(card.category || '其他') + '</span>' +
                    '<div class="card-header">' +
                        '<div class="card-avatar" style="' + avatarStyle + '">' + (avatarImg ? '' : (card.name ? card.name.charAt(0) : '?')) + '</div>' +
                        '<div>' +
                            '<div class="card-name">' + escapeHtml(card.name) + '</div>' +
                            (card.nameEn ? '<div class="card-name-en">' + escapeHtml(card.nameEn) + '</div>' : '') +
                            '<div class="card-title">' + (escapeHtml(card.title) || '—') + '</div>' +
                        '</div>' +
                    '</div>' +
                    (card.company ? '<div class="card-company">🏢 ' + escapeHtml(card.company) + '</div>' : '') +
                    '<div class="card-contacts">' +
                        (card.phone ? '<div class="card-contact">📱 ' + escapeHtml(card.phone) + '</div>' : '') +
                        (card.lineId ? '<div class="card-contact card-line">💬 ' + escapeHtml(card.lineId) + '</div>' : '') +
                    '</div>' +
                    (hasImages ? '<div class="card-images">' +
                        (frontImg ? '<div class="card-image-thumb" style="background-image:url(\'' + frontImg + '\')"></div>' : '') +
                        (backImg ? '<div class="card-image-thumb" style="background-image:url(\'' + backImg + '\')"></div>' : '') +
                    '</div>' : '') +
                '</div>';
            }).join('');
        }

                imagesHtml = '<div class="detail-images">';
                if (frontImg) imagesHtml += '<div class="detail-image"><img src="' + frontImg + '" alt="正面"><div class="detail-image-label">正面</div></div>';
                if (backImg) imagesHtml += '<div class="detail-image"><img src="' + backImg + '" alt="背面"><div class="detail-image-label">背面</div></div>';
                imagesHtml += '</div>';
            }

            document.getElementById('detailContent').innerHTML = 
                imagesHtml +
                '<div class="detail-header">' +
                    '<div class="detail-avatar" style="' + avatarStyle + '">' + (avatarImg ? '' : card.name.charAt(0)) + '</div>' +
                    '<div class="detail-info">' +
                        '<h2>' + escapeHtml(card.name) + '</h2>' +
                        (card.nameEn ? '<div class="name-en">' + escapeHtml(card.nameEn) + '</div>' : '') +
                        '<p>' + (escapeHtml(card.title) || '—') + '</p>' +
                        '<span class="detail-category">' + escapeHtml(card.category || '其他') + '</span>' +
                    '</div>' +
                '</div>' +
                '<div class="detail-section">' +
                    (card.company ? '<div class="detail-row"><span class="detail-row-icon">🏢</span><span class="detail-row-label">公司</span><span class="detail-row-value">' + escapeHtml(card.company) + '</span></div>' : '') +
                    (card.mobile ? '<div class="detail-row"><span class="detail-row-icon">📱</span><span class="detail-row-label">行動</span><span class="detail-row-value"><a href="tel:' + card.mobile + '">' + escapeHtml(card.mobile) + '</a></span></div>' : '') +
                    (card.mobile2 ? '<div class="detail-row"><span class="detail-row-icon">📱</span><span class="detail-row-label">行動2</span><span class="detail-row-value"><a href="tel:' + card.mobile2 + '">' + escapeHtml(card.mobile2) + '</a></span></div>' : '') +
                    (card.phone ? '<div class="detail-row"><span class="detail-row-icon">☎️</span><span class="detail-row-label">市話</span><span class="detail-row-value"><a href="tel:' + card.phone + '">' + escapeHtml(card.phone) + '</a></span></div>' : '') +
                    (card.fax ? '<div class="detail-row"><span class="detail-row-icon">📠</span><span class="detail-row-label">傳真</span><span class="detail-row-value">' + escapeHtml(card.fax) + '</span></div>' : '') +
                    (card.lineId ? '<div class="detail-row"><span class="detail-row-icon">💬</span><span class="detail-row-label">LINE</span><span class="detail-row-value line"><a href="https://line.me/ti/p/~' + card.lineId + '" target="_blank">' + escapeHtml(card.lineId) + '</a></span></div>' : '') +
                    (card.email ? '<div class="detail-row"><span class="detail-row-icon">✉️</span><span class="detail-row-label">Email</span><span class="detail-row-value"><a href="mailto:' + card.email + '">' + escapeHtml(card.email) + '</a></span></div>' : '') +
                    (card.address ? '<div class="detail-row"><span class="detail-row-icon">📍</span><span class="detail-row-label">地址</span><span class="detail-row-value">' + escapeHtml(card.address) + '</span></div>' : '') +
                    (card.website ? '<div class="detail-row"><span class="detail-row-icon">🌐</span><span class="detail-row-label">網站</span><span class="detail-row-value"><a href="' + (card.website.startsWith('http') ? card.website : 'https://' + card.website) + '" target="_blank">' + escapeHtml(card.website) + '</a></span></div>' : '') +
                    (card.taxId ? '<div class="detail-row"><span class="detail-row-icon">🔢</span><span class="detail-row-label">統編</span><span class="detail-row-value">' + escapeHtml(card.taxId) + '</span></div>' : '') +
                '</div>' +
                (card.notes ? '<div class="detail-notes"><h4>📝 備註</h4><p>' + escapeHtml(card.notes) + '</p></div>' : '') +
                '<div class="form-actions">' +
                    '<button class="btn btn-danger" onclick="deleteCard(\'' + card.id + '\')">🗑️ 刪除</button>' +
                    '<button class="btn btn-primary" onclick="openEditModal(\'' + card.id + '\')">✏️ 編輯</button>' +
                '</div>';

            document.getElementById('detailModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeDetailModal() {
            document.getElementById('detailModal').classList.remove('active');
            document.body.style.overflow = '';
        }

        function openEditModal(id) {
            var card = cards.find(function(c) { return c.id === id; });
            if (!card) return;

            editingId = id;
            document.getElementById('modalTitle').textContent = '✏️ 編輯名片';
            
            document.getElementById('cardName').value = card.name || '';
            document.getElementById('cardNameEn').value = card.nameEn || '';
            document.getElementById('cardCompany').value = card.company || '';
            document.getElementById('cardTitle').value = card.title || '';
            document.getElementById('cardMobile').value = card.mobile || '';
            document.getElementById('cardMobile2').value = card.mobile2 || '';
            document.getElementById('cardPhone').value = card.phone || '';
            document.getElementById('cardFax').value = card.fax || '';
            document.getElementById('cardTaxId').value = card.taxId || '';
            document.getElementById('cardEmail').value = card.email || '';
            document.getElementById('cardLine').value = card.lineId || '';
            document.getElementById('cardCategory').value = card.category || categories[0];
            document.getElementById('cardAddress').value = card.address || '';
            document.getElementById('cardWebsite').value = card.website || '';
            document.getElementById('cardNotes').value = card.notes || '';

            cardFrontUrl = card.cardFrontUrl || '';
            cardBackUrl = card.cardBackUrl || '';
            avatarUrl = card.avatarUrl || '';
            cardFrontImage = null;
            cardBackImage = null;
            avatarImage = null;

            if (cardFrontUrl) {
                document.getElementById('cardFrontBox').innerHTML = '<img src="' + getDriveImageUrl(cardFrontUrl) + '" alt="正面">';
                document.getElementById('cardFrontBox').classList.add('has-image');
            }
            if (cardBackUrl) {
                document.getElementById('cardBackBox').innerHTML = '<img src="' + getDriveImageUrl(cardBackUrl) + '" alt="背面">';
                document.getElementById('cardBackBox').classList.add('has-image');
            }
            if (avatarUrl) {
                document.getElementById('avatarPreview').style.backgroundImage = 'url("' + getDriveImageUrl(avatarUrl) + '")';
                document.getElementById('avatarPreview').classList.add('has-image');
                document.getElementById('avatarPreview').textContent = '';
            }

            document.getElementById('ocrResult').classList.remove('active');
            closeDetailModal();
            document.getElementById('addModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        async function deleteCard(id) {
            if (!confirm('確定刪除這張名片？')) return;
            showLoading('刪除中...');
            try {
                var result = await apiCall('delete', { id: id });
                if (result.success) {
                    showNotification('🗑️ 已刪除', 'success');
                    closeDetailModal();
                    await syncFromCloud();
                } else {
                    throw new Error(result.error);
                }
            } catch (err) {
                showNotification('刪除失敗: ' + err.message, 'error');
            }
            hideLoading();
        }

        // ===== AI 名片辨識（Gemini）=====
        async function recognizeCard() {
            if (!cardFrontImage) return;

            var btn = document.getElementById('recognizeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> AI 辨識中';
            showLoading('🤖 AI 辨識中，請稍候...');

            try {
                var base64Content = cardFrontImage.split(',')[1];
                var mimeType = (cardFrontImage.match(/data:(.*?);/) || [])[1] || 'image/jpeg';
                var result = await apiCall('aiRecognize', { base64Image: base64Content, mimeType: mimeType });

                if (result.success && result.card) {
                    fillFormFromAI(result.card);
                    renderAiSummary(result.card);
                    document.getElementById('ocrResult').classList.add('active');

                    // 用 AI 回傳的四角座標自動校正名片正面圖
                    if (result.card.corners) {
                        showLoading('📐 校正名片中...');
                        var corrected = await applyAiPerspectiveCorrection(cardFrontImage, result.card);
                        if (corrected) {
                            cardFrontImage = corrected;
                            cardFrontUrl = ''; // 已變更，需重新上傳
                            var box = document.getElementById('cardFrontBox');
                            box.innerHTML = '<img src="' + corrected + '" alt="名片">';
                            box.classList.add('has-image');
                            showNotification('🤖 辨識完成，已自動校正名片', 'success');
                        } else {
                            showNotification('🤖 辨識完成（自動校正略過）', 'success');
                        }
                    } else {
                        showNotification('🤖 AI 辨識完成，已填入表單', 'success');
                    }
                } else {
                    throw new Error(result.error || 'AI 無法辨識');
                }
            } catch (err) {
                console.error('AI 辨識錯誤:', err);
                showNotification('AI 辨識失敗: ' + err.message, 'error');
            }

            hideLoading();
            btn.disabled = false;
            btn.innerHTML = '🤖 AI 辨識';
        }

        // 把 AI 回傳的結構化資料填入表單
        function fillFormFromAI(c) {
            // 行動電話可能有多支（AI 用 / 分隔），自動拆成兩欄
            var mobile1 = c.mobile || '';
            var mobile2 = '';
            if (mobile1.indexOf('/') !== -1) {
                var parts = mobile1.split('/').map(function(s) { return s.trim(); }).filter(function(s) { return s; });
                mobile1 = parts[0] || '';
                mobile2 = parts.slice(1).join(' / ');
            }

            var map = {
                cardName: c.name, cardNameEn: c.nameEn, cardCompany: c.company,
                cardTitle: c.title, cardMobile: mobile1, cardMobile2: mobile2,
                cardPhone: c.phone, cardFax: c.fax, cardTaxId: c.taxId,
                cardEmail: c.email, cardLine: c.line, cardWebsite: c.website,
                cardAddress: c.address
            };
            Object.keys(map).forEach(function(id) {
                var el = document.getElementById(id);
                if (el && map[id]) {
                    el.value = map[id];
                    el.style.backgroundColor = 'rgba(6, 214, 160, 0.2)';
                    setTimeout(function() { el.style.backgroundColor = ''; }, 1000);
                }
            });
            if (c.notes) {
                var notesEl = document.getElementById('cardNotes');
                if (notesEl && !notesEl.value) notesEl.value = c.notes;
            }
        }

        // 顯示 AI 辨識摘要
        function renderAiSummary(c) {
            var rows = [
                ['姓名', c.name], ['英文名', c.nameEn], ['公司', c.company],
                ['職稱', c.title], ['行動', c.mobile], ['市話', c.phone],
                ['傳真', c.fax], ['統編', c.taxId], ['Email', c.email],
                ['LINE', c.line], ['網站', c.website], ['地址', c.address],
                ['備註', c.notes]
            ];
            var html = rows.filter(function(r) { return r[1]; }).map(function(r) {
                return '<div class="ai-summary-row"><span class="ai-summary-label">' + r[0] +
                    '</span><span class="ai-summary-value">' + escapeHtml(r[1]) + '</span></div>';
            }).join('');
            document.getElementById('aiSummary').innerHTML = html || '<div style="color:var(--text-muted)">未擷取到資料</div>';
        }


        // ===== 工具 =====
        function escapeHtml(str) {
            if (!str) return '';
            return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        // ===== 事件 =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddModal();
                closeDetailModal();
                closeCategoryModal();
            }
        });

        document.getElementById('addModal').addEventListener('click', function(e) { if (e.target === this) closeAddModal(); });
        document.getElementById('detailModal').addEventListener('click', function(e) { if (e.target === this) closeDetailModal(); });
        document.getElementById('categoryModal').addEventListener('click', function(e) { if (e.target === this) closeCategoryModal(); });
    </script>
</body>
</html>
